<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>المحلل المالي الاحترافي</title>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700;900&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        body { font-family: 'Cairo', sans-serif; background-color: #f8fafc; touch-action: manipulation; }
        .animate-fade { animation: fadeIn 0.3s ease-out; }
        @keyframes fadeIn { from { opacity: 0; transform: scale(0.95); } to { opacity: 1; transform: scale(1); } }
    </style>
</head>
<body>
    <div id="root"></div>
    <script type="text/babel">
        const { useState, useEffect } = React;

        const App = () => {
            const [view, setView] = useState('dashboard');
            const [notification, setNotification] = useState(null);
            
            const [expenses, setExpenses] = useState(() => {
                const saved = localStorage.getItem('ultra_pro_expenses_v2');
                return saved ? JSON.parse(saved) : [];
            });

            const [formData, setFormData] = useState({ title: '', amount: '', category: 'طعام', type: 'شخصي' });

            const subCategories = [
                { id: 'طعام', icon: 'utensils', color: 'bg-orange-100 text-orange-600' },
                { id: 'تسوق', icon: 'shopping-bag', color: 'bg-blue-100 text-blue-600' },
                { id: 'صحة', icon: 'heart-pulse', color: 'bg-red-100 text-red-600' },
                { id: 'ترفيه', icon: 'clapperboard', color: 'bg-purple-100 text-purple-600' },
                { id: 'أخرى', icon: 'more-horizontal', color: 'bg-slate-100 text-slate-600' }
            ];

            useEffect(() => {
                localStorage.setItem('ultra_pro_expenses_v2', JSON.stringify(expenses));
                lucide.createIcons();
            }, [expenses, view]);

            const notify = (msg) => {
                setNotification(msg);
                setTimeout(() => setNotification(null), 3000);
            };

            const handleSave = () => {
                if (!formData.title || !formData.amount) {
                    alert("يرجى إكمال البيانات");
                    return;
                }
                const newEntry = { 
                    ...formData, 
                    id: Date.now(), 
                    amount: parseFloat(formData.amount), 
                    date: new Date().toLocaleDateString('ar-SA') 
                };
                setExpenses([newEntry, ...expenses]);
                notify("تم الحفظ بنجاح ✅");
                setView('dashboard');
                setFormData({ title: '', amount: '', category: 'طعام', type: 'شخصي' });
            };

            const deleteSingle = (id) => {
                if (window.confirm("حذف هذه العملية؟")) {
                    setExpenses(expenses.filter(e => e.id !== id));
                    notify("تم الحذف 🗑️");
                }
            };

            const clearAll = () => {
                if (window.confirm("⚠️ مسح السجل بالكامل؟")) {
                    setExpenses([]);
                    notify("تم التصفير 🧹");
                }
            };

            const totalP = expenses.filter(e => e.type === 'شخصي').reduce((s, e) => s + e.amount, 0);
            const totalF = expenses.filter(e => e.type === 'عائلي').reduce((s, e) => s + e.amount, 0);

            return (
                <div className="max-w-md mx-auto min-h-screen pb-28 relative overflow-x-hidden">
                    {notification && (
                        <div className="fixed top-5 left-1/2 -translate-x-1/2 z-[100] bg-slate-900 text-white px-6 py-3 rounded-full shadow-2xl text-[10px] font-bold animate-bounce flex items-center gap-2">
                             {notification}
                        </div>
                    )}

                    <nav className="bg-white p-4 shadow-sm flex justify-between items-center sticky top-0 z-50 border-b">
                        <div className="flex items-center gap-2 text-indigo-700">
                            <i data-lucide="shield-check" size="20"></i>
                            <span className="font-black text-sm">المحلل المالي</span>
                        </div>
                        <div className="flex bg-slate-100 p-1 rounded-xl text-[10px] font-bold">
                            <button onClick={() => setView('dashboard')} className={`px-4 py-2 rounded-lg transition ${view==='dashboard'?'bg-white shadow text-indigo-600':'text-slate-400'}`}>الرئيسية</button>
                            <button onClick={() => setView('history')} className={`px-4 py-2 rounded-lg transition ${view==='history'?'bg-white shadow text-indigo-600':'text-slate-400'}`}>السجل</button>
                        </div>
                    </nav>

                    <div className="p-4">
                        {view === 'dashboard' ? (
                            <div className="space-y-4 animate-fade">
                                <div className="grid grid-cols-2 gap-3">
                                    <div className="bg-white p-4 rounded-3xl border border-slate-100 shadow-sm text-center">
                                        <p className="text-[10px] font-bold text-slate-400 mb-1 tracking-widest">إجمالي الشخصي</p>
                                        <p className="text-xl font-black text-indigo-600">${totalP.toLocaleString()}</p>
                                    </div>
                                    <div className="bg-white p-4 rounded-3xl border border-slate-100 shadow-sm text-center">
                                        <p className="text-[10px] font-bold text-slate-400 mb-1 tracking-widest">إجمالي العائلي</p>
                                        <p className="text-xl font-black text-emerald-600">${totalF.toLocaleString()}</p>
                                    </div>
                                </div>

                                <div className="bg-white p-5 rounded-3xl shadow-sm border border-slate-50 space-y-4">
                                    <h3 className="text-xs font-black text-slate-800 flex items-center gap-2">
                                        <i data-lucide="bar-chart-3" size="14"></i> توزيع الميزانية
                                    </h3>
                                    <div className="w-full bg-slate-100 h-8 rounded-2xl overflow-hidden flex">
                                        <div className="bg-indigo-500 h-full transition-all duration-700" style={{width: `${(totalP/(totalP+totalF || 1))*100}%`}}></div>
                                        <div className="bg-emerald-500 h-full transition-all duration-700" style={{width: `${(totalF/(totalP+totalF || 1))*100}%`}}></div>
                                    </div>
                                    <div className="flex justify-center gap-6 text-[10px] font-black">
                                        <div className="flex items-center gap-1.5"><span className="w-2.5 h-2.5 bg-indigo-500 rounded-full"></span> شخصي</div>
                                        <div className="flex items-center gap-1.5"><span className="w-2.5 h-2.5 bg-emerald-500 rounded-full"></span> عائلي</div>
                                    </div>
                                </div>

                                <button onClick={() => setView('add')} className="w-full bg-indigo-600 text-white p-8 rounded-[2.5rem] font-black shadow-xl shadow-indigo-100 flex flex-col items-center gap-2 hover:bg-indigo-700 active:scale-95 transition mt-6">
                                    <div className="bg-white/20 p-3 rounded-full"><i data-lucide="plus" size="28"></i></div>
                                    <span>إضافة مصروف جديد</span>
                                </button>
                            </div>
                        ) : view === 'history' ? (
                            <div className="space-y-3 animate-fade">
                                <div className="flex justify-between items-center mb-2 px-1">
                                    <h3 className="font-black text-slate-800">السجل</h3>
                                    {expenses.length > 0 && (
                                        <button onClick={clearAll} className="text-[9px] font-black text-red-500 bg-red-50 px-3 py-2 rounded-xl border border-red-100 uppercase tracking-tighter">مسح السجل كاملاً</button>
                                    )}
                                </div>
                                {expenses.length === 0 ? (
                                    <div className="text-center py-24 grayscale opacity-20"><i data-lucide="inbox" size="48" className="mx-auto"></i><p className="font-bold text-xs mt-2">لا توجد بيانات</p></div>
                                ) : (
                                    expenses.map(e => (
                                        <div key={e.id} className="bg-white p-4 rounded-2xl flex justify-between items-center border border-slate-50 shadow-sm">
                                            <div className="flex items-center gap-3">
                                                <div className={`p-2.5 rounded-xl ${subCategories.find(c=>c.id===e.category)?.color || 'bg-slate-100'}`}>
                                                    <i data-lucide={subCategories.find(c=>c.id===e.category)?.icon || 'tag'} size="18"></i>
                                                </div>
                                                <div>
                                                    <p className="font-black text-sm text-slate-800 leading-tight">{e.title}</p>
                                                    <p className="text-[9px] text-slate-400 font-bold mt-1 uppercase">{e.type} • {e.category} • {e.date}</p>
                                                </div>
                                            </div>
                                            <div className="flex items-center gap-4">
                                                <p className="font-black text-red-500 text-sm">-${e.amount}</p>
                                                <button onClick={()=>deleteSingle(e.id)} className="text-slate-200 hover:text-red-500 transition"><i data-lucide="trash-2" size="16"></i></button>
                                            </div>
                                        </div>
                                    ))
                                )}
                            </div>
                        ) : (
                            <div className="bg-white p-6 rounded-[2.5rem] shadow-xl space-y-5 animate-fade border border-white">
                                <div className="flex justify-between items-center">
                                    <h3 className="font-black text-slate-800">إدخال مصروف</h3>
                                    <button onClick={()=>setView('dashboard')} className="p-2 bg-slate-50 rounded-full text-slate-400"><i data-lucide="x" size="18"></i></button>
                                </div>
                                
                                <div className="space-y-4">
                                    <div className="flex p-1 bg-slate-100 rounded-2xl">
                                        <button onClick={()=>setFormData({...formData, type:'شخصي'})} className={`flex-1 py-3 rounded-xl font-black text-xs transition ${formData.type==='شخصي'?'bg-white shadow text-indigo-600':'text-slate-400'}`}>شخصي</button>
                                        <button onClick={()=>setFormData({...formData, type:'عائلي'})} className={`flex-1 py-3 rounded-xl font-black text-xs transition ${formData.type==='عائلي'?'bg-white shadow text-emerald-600':'text-slate-400'}`}>عائلي</button>
                                    </div>

                                    <div className="space-y-2">
                                        <p className="text-[10px] font-black text-slate-400 mr-2 uppercase tracking-widest">التصنيف الفرعي</p>
                                        <div className="grid grid-cols-5 gap-2">
                                            {subCategories.map(cat => (
                                                <button 
                                                    key={cat.id}
                                                    onClick={()=>setFormData({...formData, category:cat.id})}
                                                    className={`flex flex-col items-center gap-1.5 p-2 rounded-xl transition-all ${formData.category===cat.id ? 'bg-indigo-600 text-white scale-105 shadow-lg shadow-indigo-100' : 'bg-slate-50 text-slate-400 hover:bg-slate-100'}`}
                                                >
                                                    <i data-lucide={cat.icon} size="16"></i>
                                                    <span className="text-[8px] font-black">{cat.id}</span>
                                                </button>
                                            ))}
                                        </div>
                                    </div>

                                    <input type="text" placeholder="الوصف (مثلاً: فاتورة الصيدلية)" className="w-full p-4 bg-slate-50 rounded-2xl border-2 border-transparent focus:border-indigo-500 outline-none font-bold text-sm" value={formData.title} onChange={ev=>setFormData({...formData, title:ev.target.value})} />
                                    <input type="number" placeholder="المبلغ 0.00" className="w-full p-5 bg-slate-100 rounded-2xl border-none outline-none font-black text-lg text-left" value={formData.amount} onChange={ev=>setFormData({...formData, amount:ev.target.value})} />

                                    <button onClick={handleSave} className="w-full bg-indigo-600 text-white p-5 rounded-2xl font-black shadow-lg shadow-indigo-200 active:scale-95 transition-all flex items-center justify-center gap-2 mt-2">
                                        <i data-lucide="save" size="20"></i> ترحيل وحفظ
                                    </button>
                                </div>
                            </div>
                        )}
                    </div>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
